version: 0.2

phases:
  pre_build:
    commands:
      - echo Installing dependencies...
      - npm install
  build:
    commands:
      - echo Running simple tests...
      - npm test -- --watchAll=false
      - echo Tests completed
  post_build:
    commands:
      - echo Test phase completed successfully

artifacts:
  files:
    - '**/*.log'
  name: test-results
  base-directory: .

cache:
  paths:
    - node_modules/**/*

